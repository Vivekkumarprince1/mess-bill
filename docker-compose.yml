version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: mess-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    networks:
      - mess-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mess-backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://admin:password@mongodb:27017/mess-fraud-db?authSource=admin
      JWT_SECRET: dev_secret_key_change_in_production
      NODE_ENV: development
    depends_on:
      - mongodb
    networks:
      - mess-network
    volumes:
      - ./server:/app
      - /app/node_modules

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mess-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - mess-network
    volumes:
      - ./client:/app
      - /app/node_modules

volumes:
  mongodb_data:

networks:
  mess-network:
    driver: bridge
